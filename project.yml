name: Fling
options:
  bundleIdPrefix: com.fling
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  Fling:
    type: application
    platform: macOS
    sources:
      - path: Fling
        excludes:
          - Resources
    resources:
      - path: Fling/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fling.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Fling/Info.plist
        CODE_SIGN_ENTITLEMENTS: Fling/Fling.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
